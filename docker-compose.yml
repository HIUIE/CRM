services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://${PG_USER:-postgres}:${PG_PASSWORD}@db:5432/${PG_DATABASE:-smarttrade_crm}
      - PG_HOST=db
      - PG_PORT=5432
      - PG_DATABASE=${PG_DATABASE:-smarttrade_crm}
      - PG_USER=${PG_USER:-postgres}
      - PG_PASSWORD=${PG_PASSWORD:?err}
      - JWT_SECRET=${JWT_SECRET:?err}
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD:?err}
      - NODE_ENV=production
    volumes:
      - crm-uploads:/app/data/uploads
      - crm-backups:/app/data/backups
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=smarttrade_crm
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${PG_PASSWORD:?err}
    volumes:
      - crm-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smarttrade_crm"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  crm-uploads:
  crm-backups:
  crm-db-data:
